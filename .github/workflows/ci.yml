name: ci
on:
  push: {branches: ["**"]}
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch the Joni testbed (kernel + CoreState)
        uses: actions/checkout@v4
        with:
          repository: hstre/Joni
          path: _joni
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e _joni pytest
      - run: python -m pytest tests/ -q
